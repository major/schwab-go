version: "2"

linters:
  default: standard
  enable:
    - asciicheck
    - bidichk
    - bodyclose
    - canonicalheader
    - containedctx
    - contextcheck
    - copyloopvar
    - cyclop
    - durationcheck
    - dupword
    - embeddedstructfieldcheck
    - errchkjson
    - errname
    - errorlint
    - fatcontext
    - forcetypeassert
    - gocheckcompilerdirectives
    - gocritic
    - godoclint
    - gomoddirectives
    - inamedparam
    - intrange
    - ireturn
    - loggercheck
    - gosec
    - makezero
    - mirror
    - misspell
    - modernize
    - nilerr
    - nilnesserr
    - nilnil
    - noctx
    - nolintlint
    - perfsprint
    - prealloc
    - predeclared
    - reassign
    - recvcheck
    - revive
    - testifylint
    - thelper
    - unconvert
    - unparam
    - usetesting
    - usestdlibvars
    - wastedassign
    - wrapcheck
    - whitespace

  settings:
    cyclop:
      max-complexity: 20

    gocritic:
      enabled-tags:
        - diagnostic
        - performance
        - style

    errorlint:
      errorf: true
      asserts: true
      comparison: true

    errcheck:
      check-type-assertions: true
      check-blank: true

    misspell:
      locale: US

    nolintlint:
      require-explanation: true
      require-specific: true

    revive:
      rules:
        - name: indent-error-flow
        - name: unexported-return
          disabled: true

    testifylint:
      enable-all: true

  exclusions:
    generated: strict
    presets:
      - comments
      - std-error-handling
      - common-false-positives
    rules:
      - path: _test\.go
        linters:
          - bodyclose
          - goconst
          - gosec
          - unparam
      - path: _test\.go
        linters:
          - modernize
      - path: schwab/(marketdata|trader)/client\.go
        text: "G704: SSRF via taint analysis"
        linters:
          - gosec

run:
  timeout: 5m
